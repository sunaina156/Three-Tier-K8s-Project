apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: three-tier 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: mongo:latest
        ports:
        - containerPort: 27017
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: username
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: password
        
        volumeMounts:
        - name: mongo-storage
          mountPath: /data/db    #MongoDB stores data in /data/db internally, so we mount the volume there
      
      volumes:     # connects pvc to pod
      - name: mongo-storage
        persistentVolumeClaim:
          claimName: mongo-pvc

        